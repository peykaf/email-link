      window.onload = function() {

ignificant%20emotional%20and%20financial%20hardship.%0A%0AI%20would%20also%20like%20to%20recognize%20the%20leadership%20of%20%2A%2AMP%20Ali%20Ehsassi%2A%2A%2C%20who%20played%20a%20key%20role%20in%20advancing%20the%20IRGC%20listing%20and%20has%20since%20taken%20the%20initiative%20to%20help%20resolve%20its%20unintended%20consequences%20for%20former%20conscripts.%0A%0AI%20have%20copied%20Mr.%20Ehsassi%20because%2C%20while%20he%20has%20already%20taken%20meaningful%20steps%20on%20this%20issue%2C%20resolving%20it%20requires%20the%20collective%20support%20of%20Liberal%20Members%20of%20Parliament.%20Your%20engagement%20and%20collaboration%20with%20him%20can%20help%20accelerate%20the%20development%20of%20a%20fair%20and%20practical%20solution.%0A%0AI%20respectfully%20ask%20that%20you%3A%0A%0AContact%20MP%20Ali%20Ehsassi%20to%20support%20and%20coordinate%20efforts%20to%20resolve%20this%20issue.%0A%0ARaise%20this%20matter%20with%20the%20Minister%20of%20Public%20Safety%20and%20the%20Minister%20of%20Immigration.%0A%0ASupport%20the%20issuance%20of%20clear%20ministerial%20guidance%20under%20section%2042.1%282%29%20of%20the%20Immigration%20and%20Refugee%20Protection%20Act%20to%20ensure%20that%20compulsory%20conscription%20is%20not%20treated%20as%20automatic%20membership%20in%20the%20IRGC%20and%20that%20genuine%20individualized%20assessments%20are%20conducted.%0A%0AAdvocate%20for%20the%20timely%20review%20of%20the%20many%20cases%20that%20have%20remained%20stalled%20despite%20the%20Government%27s%20repeated%20assurances.%0A%0A%2A%2AThis%20is%20not%20a%20request%20to%20weaken%20Canada%27s%20position%20against%20the%20IRGC.%20Rather%2C%20it%20is%20a%20request%20to%20ensure%20that%20the%20policy%20is%20implemented%20as%20intended%3B%2A%2A%20holding%20accountable%20those%20who%20voluntarily%20supported%20the%20IRGC%20while%20protecting%20individuals%20who%20were%20compelled%20by%20law%20to%20perform%20mandatory%20service.%0A%0AAs%20your%20constituent%2C%20I%20would%20greatly%20appreciate%20your%20support%20and%20would%20welcome%20the%20opportunity%20to%20discuss%20this%20matter%20further%20or%20learn%20what%20steps%20you%20may%20be%20able%20to%20take.%0A%0AThank%20you%20for%20your%20time%20and%20consideration.%20I%20look%20forward%20to%20your%20response.%0A%0ASincerely%2C%0A%0A%2A%2AP.S.%2A%2A%20The%20%2A%2AUnheard%20Conscripts%20Advocacy%20Network%20%28UCAN%29%2A%2A%20is%20a%20volunteer-led%20initiative%20advocating%20for%20fair%20and%20consistent%20immigration%20treatment%20of%20former%20Iranian%20conscripts%20affected%20by%20the%20IRGC%20listing.%0A%0AIf%20your%20office%20would%20like%20additional%20information%2C%20background%20materials%2C%20or%20examples%20of%20affected%20cases%2C%20please%20feel%20free%20to%20contact%20UCAN%20at%20info%40ucanetwork.ca%20or%20visit%20www.ucanetwork.ca.%0A";
